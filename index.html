    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <style>
      :root {
        --bg-url: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070');
        --global-bg: #020617;
        --global-bg-img: linear-gradient(to bottom, rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)), var(--bg-url);
        --accent-color: #3b82f6;
        --blueprint-opacity: 0.08;
        --card-bg: rgba(15, 23, 42, 0.85);
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --header-bg: rgba(2, 6, 23, 0.85);
        --input-bg: rgba(0, 0, 0, 0.2);
        --watermark-filter: brightness(0) invert(1);
      }

      [data-theme="light"] {
        --global-bg: #f8fafc;
        --global-bg-img: linear-gradient(to bottom, rgba(248, 250, 252, 0.92), rgba(248, 250, 252, 0.96)), var(--bg-url);
        --accent-color: #2563eb;
        --blueprint-opacity: 0.04;
        --card-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border-color: rgba(0, 0, 0, 0.08);
        --header-bg: rgba(255, 255, 255, 0.85);
        --input-bg: rgba(241, 245, 249, 1);
        --watermark-filter: none;
      }

      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        background-color: var(--global-bg);
        color: var(--text-primary);
        overflow-x: hidden;
      }
      
      .iete-theme-bg {
        min-height: 100vh;
        background-color: var(--global-bg);
        background-image: var(--global-bg-img);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }

      .chat-blueprint {
        background-image: 
          linear-gradient(rgba(59, 130, 246, var(--blueprint-opacity)) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, var(--blueprint-opacity)) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .theme-glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        border: 1px solid var(--border-color);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
      }

      .typing-cursor::after {
        content: "▊";
        margin-left: 2px;
        animation: blink 1s step-end infinite;
        color: #3b82f6;
      }

      @keyframes blink {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }

      .markdown-body { font-size: 14px; line-height: 1.6; }
      .katex-display { 
        margin: 1.5em 0; 
        padding: 1.5em; 
        background: rgba(59, 130, 246, 0.08); 
        border-radius: 16px; 
        border: 1px solid rgba(59, 130, 246, 0.2);
        overflow-x: auto;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
      }
      .katex { font-size: 1.15em; color: inherit; }
    </style>
